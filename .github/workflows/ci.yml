name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Verify no secrets committed
        run: |
          if grep -rni "pit-" --include="*.ts" --include="*.js" --include="*.json" --include="*.md" . 2>/dev/null | grep -v "node_modules" | grep -v "dist"; then
            echo "ERROR: Potential secret found in source"
            exit 1
          fi
          echo "No secrets detected"
